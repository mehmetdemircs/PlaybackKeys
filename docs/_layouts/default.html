<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ site.description }}">
<style>
  :root {
    color-scheme: light dark;
    --bg:        #ffffff;
    --panel:     #fafafa;
    --line:      #e6e6e8;
    --fg:        #1a1a1d;
    --fg-2:      #5a5a62;
    --fg-3:      #8a8a92;
    --accent:    #c8861f;
    --accent-ink:#1a1208;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:        #0b0b0c;
      --panel:     #141417;
      --line:      #232327;
      --fg:        #ececee;
      --fg-2:      #a8a8af;
      --fg-3:      #6c6c74;
      --accent:    #f4b23e;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 56px 24px 80px;
  }
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 24px;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--line);
  }
  header .mark {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--accent);
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  header .mark svg { width: 22px; height: 22px; }
  header .name {
    font-weight: 600;
    font-size: 16px;
    letter-spacing: -0.005em;
  }
  header .crumb {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--fg-3);
  }
  h1 { font-size: 28px; margin: 0 0 8px; letter-spacing: -0.02em; font-weight: 600; }
  h2 { font-size: 18px; margin: 32px 0 12px; font-weight: 600; }
  p, li { color: var(--fg-2); margin: 8px 0; }
  ul { padding-left: 22px; }
  li { margin: 6px 0; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code {
    font-family: var(--mono);
    font-size: 14px;
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 1px 6px;
    border-radius: 5px;
    color: var(--fg);
  }
  em { color: var(--fg-3); font-style: normal; font-family: var(--mono); font-size: 14px; }
  strong { color: var(--fg); font-weight: 600; }
  footer {
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--fg-3);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  footer a { color: var(--fg-3); }
</style>
</head>
<body>
<main>
  <header>
    <span class="mark" aria-hidden="true">
      <svg viewBox="0 0 64 64"><rect x="8" y="8" width="48" height="48" rx="11" fill="#F4B23E"/><path d="M16 16 H32 V48 H16 Z" fill="#1a1208"/><path d="M34 18 L50 32 L34 46 Z" fill="#1a1208"/></svg>
    </span>
    <span class="name">PlaybackKeys</span>
    <span class="crumb">{{ page.title | default: site.title }}</span>
  </header>

  {{ content }}

  <footer>
    <span>MIT licensed · No telemetry · No network</span>
    <a href="https://github.com/mehmetdemircs/PlaybackKeys">github.com/mehmetdemircs/PlaybackKeys</a>
  </footer>
</main>
</body>
</html>
